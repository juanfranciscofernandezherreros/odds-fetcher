name: Fetch NBA Odds

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "Odds API key (leave empty to use the repository secret)"
        required: false
        type: secret
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NBA odds
        env:
          ODDS_API_KEY: ${{ inputs.api_key || secrets.ODDS_API_KEY }}
        run: python fetch_odds.py
